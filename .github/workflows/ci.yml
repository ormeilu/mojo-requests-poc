# Continuous integration for mojo-requests.
#
# Two jobs, both running on a matrix of macOS (osx-arm64) and Linux (linux-64) to match the
# platforms declared in pixi.toml:
#   - lint:   `mojo format` check — fails if any source diverges from canonical formatting.
#   - test:   installs OpenSSL on Linux, starts a local HTTP+HTTPS test server, then runs all
#             three test suites (HTTP, HTTPS, streaming). The streaming + HTTPS live tests hit
#             the local server (no external network dependency).

name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-flight runs for the same ref when a new commit is pushed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (mojo format)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: pixi.toml

      - name: Format check
        run: pixi run -e default fmt-check

  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            pixi-platform: osx-arm64
          - os: ubuntu-latest
            pixi-platform: linux-64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install system OpenSSL (Linux only)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Install pixi
        uses: prefix-dev/setup-pixi@v0.8.1
        with:
          manifest-path: pixi.toml

      - name: Start local test server (HTTP + HTTPS)
        # Runs tests/server.py in the background; waits for the ports to accept connections
        # before proceeding. Parses its stdout for BASE_URL / HTTPS_BASE_URL / cert path.
        run: |
          pixi run python tests/server.py > /tmp/server.log 2>&1 &
          echo $! > /tmp/server.pid
          # Wait up to 20s for the server to come up.
          for _ in $(seq 1 40); do
            if grep -q "^HTTPS_BASE_URL=" /tmp/server.log; then break; fi
            sleep 0.5
          done
          cat /tmp/server.log
          grep "^BASE_URL="       /tmp/server.log >> "$GITHUB_ENV"
          grep "^HTTPS_BASE_URL=" /tmp/server.log >> "$GITHUB_ENV"
          echo "SSL_CERT_FILE=$(grep '^ROOT=' /tmp/server.log | cut -d= -f2)/cert.pem" >> "$GITHUB_ENV"

      - name: Core tests (URL parsing, framing, JSON)
        run: pixi run test

      - name: HTTPS tests
        run: pixi run test-https

      - name: Streaming tests (local server)
        run: pixi run test-streaming

      - name: Keep-alive / connection-pool tests (local server)
        run: pixi run test-keepalive

      - name: Stop local test server
        if: always()
        run: |
          if [ -f /tmp/server.pid ]; then
            kill "$(cat /tmp/server.pid)" 2>/dev/null || true
          fi
