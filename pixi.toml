[workspace]
authors = ["Ilya Lubenets <lubenets.ilya.igorevich@gmail.com>"]
channels = ["https://conda.modular.com/max-nightly", "conda-forge"]
name = "mojo-requests"
platforms = ["osx-arm64", "linux-64"]
version = "0.1.0"

[tasks]
# Run the core test suite (URL parsing, HTTP framing, JSON, encoding)
test = "mojo -I . tests/test_requests.mojo"
# Run the HTTPS-specific test suite
test-https = "mojo -I . tests/test_https.mojo"
# Run the streaming test suite (stream=True, iter_content — reads BASE_URL / HTTPS_BASE_URL
# / SSL_CERT_FILE from env; falls back to example.com when unset)
test-streaming = "mojo -I . tests/test_streaming.mojo"
# Run the connection-pooling / keep-alive suite (framing-helper unit tests + live reuse tests —
# reads BASE_URL / HTTPS_BASE_URL / SSL_CERT_FILE from env; needs an HTTP/1.1 server)
test-keepalive = "mojo -I . tests/test_keepalive.mojo"
# Run the proxy suite (selection/absolute-form/CONNECT unit tests + live HTTP-forward and
# HTTPS-CONNECT-tunnel tests through tests/server.py's forward proxy — reads PROXY_URL / BASE_URL
# / HTTPS_BASE_URL from env; live tests are skipped when PROXY_URL is unset)
test-proxy = "mojo -I . tests/test_proxy.mojo"
# Run all unit + live tests
test-all = "mojo -I . tests/test_requests.mojo && mojo -I . tests/test_https.mojo && mojo -I . tests/test_streaming.mojo && mojo -I . tests/test_keepalive.mojo && mojo -I . tests/test_proxy.mojo"
# Run the demo (optionally start a local server first: pixi run server)
demo = "mojo -I . examples/demo.mojo"
# Run benchmarks: python requests vs httpx vs mojo-requests (hyperfine)
bench = "bash benchmark/run.sh"
# Format-check: fails if any Mojo source diverges from `mojo format`. Used by CI.
fmt-check = "mojo format --quiet requests/ tests/ examples/ && git diff --exit-code --name-only requests/ tests/ examples/"
# Start a local HTTP+HTTPS test server for the streaming/HTTPS live tests.
# Prints BASE_URL / HTTPS_BASE_URL / ROOT (cert path) on stdout; set SSL_CERT_FILE=$ROOT/cert.pem
# before invoking requests to trust the self-signed cert.
server = "python tests/server.py"

[dependencies]
mojo = ">=1.0.0b3.dev2026071921,<2"
python = ">=3.14.6,<3.15"
requests = ">=2.34.2,<3"
httpx = ">=0.28.1,<0.29"
